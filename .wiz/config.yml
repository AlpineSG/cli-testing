# Wiz CLI configuration for guardian-test
# Docs: https://docs.wiz.io/wiz-docs/docs/wizcli-overview
#
# Authenticate: wizcli auth --id <client-id> --secret <client-secret>
#
# Scans configured:
#   IaC scan:       wizcli iac scan --path .
#   Dir scan:       wizcli dir scan --path .
#   Image scan:     wizcli docker scan --image <image:tag>

# IaC scanning — Terraform, CloudFormation, Kubernetes, Dockerfiles
iac:
  paths:
    - .
  exclude:
    - node_modules
    - .git
    - dist
    - build
    - coverage

# Vulnerability scanning — source code and dependencies
dir:
  paths:
    - .
  policies:
    - "Default vulnerabilities policy"
    - "Default secrets policy"
