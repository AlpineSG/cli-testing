rules:
  - id: guardian-no-eval
    patterns:
      - pattern: eval(...)
    message: "Avoid eval() — it enables code injection attacks"
    severity: ERROR
    languages: [javascript, typescript]

  - id: guardian-no-innerhtml
    patterns:
      - pattern: $X.innerHTML = ...
    message: "Avoid innerHTML — use textContent or a sanitization library to prevent XSS"
    severity: WARNING
    languages: [javascript, typescript]
