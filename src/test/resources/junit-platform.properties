# JUnit 5 configuration for guardian-test

# Use per-class test instance lifecycle (share state within a test class)
junit.jupiter.testinstance.lifecycle.default = per_class

# Parallel execution
junit.jupiter.execution.parallel.enabled = true
junit.jupiter.execution.parallel.mode.default = same_thread
junit.jupiter.execution.parallel.mode.classes.default = concurrent
junit.jupiter.execution.parallel.config.strategy = dynamic
junit.jupiter.execution.parallel.config.dynamic.factor = 1

# Display name generator
junit.jupiter.displayname.generator.default = \
  org.junit.jupiter.api.DisplayNameGenerator$ReplaceUnderscores

# Timeout defaults (fail slow tests)
junit.jupiter.execution.timeout.default = 30s
junit.jupiter.execution.timeout.testable.method.default = 10s

# Spring Boot: increase timeouts for integration tests
junit.jupiter.execution.timeout.lifecycle.method.default = 60s

# Extensions auto-detection
junit.jupiter.extensions.autodetection.enabled = true
