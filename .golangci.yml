# golangci-lint configuration for guardian-test
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  modules-download-mode: readonly

output:
  formats:
    - format: colored-line-number
  sort-results: true

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - unused
    - ineffassign
    - gosec
    - gocritic
    - gofmt
    - goimports
    - misspell
    - prealloc
    - revive
    - unconvert
    - unparam
  disable:
    - depguard

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  errcheck:
    check-type-assertions: true
    check-blank: true
  gosec:
    excludes:
      - G104  # Unhandled errors (covered by errcheck)
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: package-comments
        disabled: true
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
  goimports:
    local-prefixes: github.com/guardian-test
  misspell:
    locale: US

issues:
  exclude-rules:
    # Relax checks in test files
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - gocritic
    - path: _test\.go
      text: "G101"  # Hardcoded credentials in tests are fine
    # Allow dot imports in test files (for testify, etc.)
    - path: _test\.go
      source: '\. "github\.com/'
      linters:
        - revive
  max-issues-per-linter: 50
  max-same-issues: 5
  new: false
